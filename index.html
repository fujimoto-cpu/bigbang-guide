function QuizChapter() {
  const questions = [
    {
      q: 'BIGBANGがデビューした年はいつ？',
      choices: ['2004年', '2005年', '2006年', '2008年'],
      ans: 2,
      explain: '2006年8月19日、ソウル五輪体操競技場でデビューコンサート開催。今年（2026年）で20周年！',
    },
    {
      q: 'BIGBANGの曲のほとんどを作詞・作曲しているメンバーは？',
      choices: ['T.O.P', 'TAEYANG', 'G-DRAGON', 'DAESUNG'],
      ans: 2,
      explain: 'G-DRAGON（権志龍）が圧倒的なプロデュース才能を発揮。「セルフプロデュース型アイドル」のK-POP元祖。',
    },
    {
      q: '2012年に世界的ヒットになったBIGBANGの代表曲は？',
      choices: ['Lies', 'Haru Haru', 'Fantastic Baby', 'BANG BANG BANG'],
      ans: 2,
      explain: 'Fantastic Baby（2012）。EDMサウンドと「ワワワ〜！」のフックでYouTube3.1億超え。',
    },
    {
      q: '日本で「D-LITE」名義で活動しているメンバーは？',
      choices: ['G-DRAGON', 'TAEYANG', 'DAESUNG', 'SEUNGRI'],
      ans: 2,
      explain: 'DAESUNG＝D-LITE。日本でドーム公演ができるレベルの大人気で、日本語も堪能。',
    },
    {
      q: '兵役・スキャンダルを経た2022年、4人で発表した再結成シングルは？',
      choices: ['Flower Road', 'Still Life', 'LOSER', 'BANG BANG BANG'],
      ans: 1,
      explain: 'Still Life（봄여름가을겨울＝春夏秋冬）。穏やかなロックバラードで4人体制で発表された。',
    },
    {
      q: 'BIGBANGのファンダム名は？',
      choices: ['ARMY', 'BLINK', 'VIP', 'ONCE'],
      ans: 2,
      explain: 'VIP（빅뱅 VIP）。BIGBANGファンの呼び名。BIGBANGが歌う「VIP」という曲もある。',
    },
  ];

  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);

  const select = (qi, ci) => {
    setAnswers({ ...answers, [qi]: ci });
  };
  const score = Object.entries(answers).filter(([k, v]) => questions[k].ans === v).length;
  const allAnswered = Object.keys(answers).length === questions.length;

  return (
    <div className="space-y-6">
      <div className="text-center">
        <div className="text-5xl mb-2">🧠</div>
        <h2 className="font-display text-4xl gold-text">QUIZ — 理解度チェック</h2>
        <p className="text-yellow-200 mt-2">全6問・気軽に答えてね</p>
      </div>

      <div className="space-y-5">
        {questions.map((q, qi) => (
          <div key={qi} className="vip-card rounded-2xl p-5">
            <h4 className="font-bold mb-3"><span className="text-yellow-300">Q{qi + 1}.</span> {q.q}</h4>
            <div className="grid sm:grid-cols-2 gap-2">
              {q.choices.map((c, ci) => {
                const picked = answers[qi] === ci;
                const correct = submitted && q.ans === ci;
                const wrongPick = submitted && picked && q.ans !== ci;
                return (
                  <button
                    key={ci}
                    onClick={() => !submitted && select(qi, ci)}
                    className={`text-left rounded-lg px-4 py-2 border transition
                      ${correct ? 'bg-green-500/20 border-green-400 text-green-200' :
                        wrongPick ? 'bg-red-500/20 border-red-400 text-red-200' :
                        picked ? 'bg-yellow-500/20 border-yellow-400 text-yellow-100' :
                        'bg-white/5 border-white/10 hover:border-yellow-400/50'}`}
                    disabled={submitted}
                  >
                    {String.fromCharCode(65 + ci)}. {c}
                  </button>
                );
              })}
            </div>
            {submitted && (
              <p className="mt-3 text-sm text-gray-200 bg-black/30 rounded-lg p-3">💡 {q.explain}</p>
            )}
          </div>
        ))}
      </div>

      <div className="text-center">
        {!submitted ? (
          <button
            onClick={() => setSubmitted(true)}
            disabled={!allAnswered}
            className={`font-display text-2xl px-10 py-4 rounded-xl ${allAnswered ? 'bg-gradient-to-r from-yellow-400 to-orange-500 text-black pulse-gold' : 'bg-gray-700 text-gray-400 cursor-not-allowed'}`}
          >
            答え合わせ！
          </button>
        ) : (
          <div className="vip-card rounded-2xl p-6 inline-block">
            <p className="font-display text-3xl gold-text">{score} / {questions.length} 正解</p>
            <p className="text-sm text-gray-300 mt-2">
              {score === questions.length ? '🎉 完璧！VIPの素質あり' :
               score >= 4 ? '👍 もうBIGBANG入門完了レベル！' :
               score >= 2 ? '😊 おしい！もう一回プロローグから読み直してみよう' :
               '📖 大丈夫、ここから一緒にBIGBANGを知っていこう！'}
            </p>
            <button
              onClick={() => { setAnswers({}); setSubmitted(false); }}
              className="mt-4 px-6 py-2 rounded-lg bg-white/10 hover:bg-white/20 text-sm"
            >
              もう一度
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

const renderChapter = (id) => {
  switch(id) {
    case 'prologue': return <PrologueChapter />;
    case 'members': return <MembersChapter />;
    case 'debut': return <DebutChapter />;
    case 'revo': return <RevolutionChapter />;
    case 'songs': return <SongsChapter />;
    case 'solo': return <SoloChapter />;
    case 'hiatus': return <HiatusChapter />;
    case 'return': return <ReturnChapter />;
    case 'cast': return <CastChapter />;
    case 'quiz': return <QuizChapter />;
    case 'ready': return <ReadyChapter />;
    default: return null;
  }
};

function App() {
  const [activeIdx, setActiveIdx] = useState(0);

  return (
    <div className="min-h-screen">
      {/* Header */}
      <header className="border-b border-yellow-500/20 bg-black/30 backdrop-blur-md sticky top-0 z-50">
        <div className="max-w-6xl mx-auto px-3 md:px-6 py-3">

            <div className="flex items-center gap-2">
              <span className="text-2xl">👑</span>
              <h1 className="font-graffiti text-xl md:text-2xl gold-text">BIGBANG 超入門</h1>
            </div>
            <div className="text-xs text-gray-400">{activeIdx + 1} / {CHAPTERS.length}</div>
          </div>
          <div className="overflow-x-auto -mx-3 md:-mx-6 px-3 md:px-6 pb-1">
            <div className="flex gap-2 min-w-min">
              {CHAPTERS.map((c, i) => (
                <button
                  key={c.id}
                  onClick={() => setActiveIdx(i)}
                  className={`shrink-0 rounded-lg px-3 py-2 text-xs md:text-sm font-bold whitespace-nowrap transition ${activeIdx === i ? 'tab-active' : 'tab-inactive'}`}
                >
                  <span className="mr-1">{c.emoji}</span>
                  <span>{c.label}</span>
                </button>
              ))}
            </div>
          </div>
          <div className="scroll-indicator h-0.5 mt-2 rounded"></div>
        </div>
      </header>

      {/* Main */}
      <main className="max-w-4xl mx-auto px-4 py-8 md:py-12">
        {renderChapter(active.id)}
      </main>

      {/* Footer Nav */}
      <nav className="sticky bottom-0 bg-black/60 backdrop-blur-md border-t border-yellow-500/20">
        <div className="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
          <button
            onClick={() => setActiveIdx(Math.max(0, activeIdx - 1))}
            disabled={activeIdx === 0}
            className="nav-btn rounded-lg px-4 py-2 bg-white/10 hover:bg-yellow-500/20 text-sm"
          >
            ← 前へ
          </button>
          <div className="text-center text-xs">
            <div className="text-gray-400">{active.emoji} {active.label}</div>
            <div className="text-yellow-300 font-bold">{active.sub}</div>

          >
            次へ →
          </button>
        </div>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
